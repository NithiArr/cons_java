services:
  - type: web
    name: construction-cms
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DB_HOST
        fromDatabase:
          name: construction-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: construction-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: construction-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: construction-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: construction-db
          property: password
      - key: PORT
        value: 8080

databases:
  - name: construction-db
    plan: free
    databaseName: construction_db
    user: postgres
