<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{base}">
<head>
    <title>Elite Page</title>
</head>
<body>
    <div layout:fragment="content">

Manage Users - Construction Management


<div class="page-header">
    <div>
        <h2><svg fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="inline-icon"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19.128a9.38 9.38 0 0 0 2.625.372 9.337 9.337 0 0 0 4.121-.952 4.125 4.125 0 0 0-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.106A12.318 12.318 0 0 1 8.624 21c-2.331 0-4.512-.645-6.374-1.766l-.001-.109a6.375 6.375 0 0 1 11.964-3.07M12 6.375a3.375 3.375 0 1 1-6.75 0 3.375 3.375 0 0 1 6.75 0Zm8.25 2.25a2.625 2.625 0 1 1-5.25 0 2.625 2.625 0 0 1 5.25 0Z" /></svg> Manage Users</h2>
        <p class="text-secondary">All users in ${request.user.company.name}</p>
    </div>
    <a th:href="/register" class="btn btn-primary">+ Add User</a>
</div>

<div class="card glass">
    <table class="table">
        <thead>
            <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Role</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            
            <tr>
                <td>${u.name}</td>
                <td>${u.email}</td>
                <td>
                    <span class="role-badge role-adminrole-managerrole-employee">
                        ${u.get_role_display}
                    </span>
                </td>
                <td>
                    
                    <form method="POST" action=""
                        onsubmit="return confirm('Delete ${u.name}? This cannot be undone.');">
                        
                        <button type="submit" class="btn btn-danger btn-sm"><svg fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="inline-icon"><path stroke-linecap="round" stroke-linejoin="round" d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0" /></svg> Delete</button>
                    </form>
                    
                    <span class="text-secondary" style="font-size: 0.8rem;">You</span>
                    
                </td>
            </tr>
            
            <tr>
                <td colspan="4" style="text-align: center; color: var(--text-secondary);">No users found.</td>
            </tr>
            
        </tbody>
    </table>
</div>



    </div>
</body>
</html>
