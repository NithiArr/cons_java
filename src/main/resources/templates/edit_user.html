<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{base}">
<head>
    <title>Edit User – Elite Build</title>
    <style>
        .toggle-wrap { display:flex; align-items:center; gap:.75rem; }
        .toggle { position:relative; width:44px; height:24px; }
        .toggle input { opacity:0; width:0; height:0; }
        .slider {
            position:absolute; cursor:pointer; inset:0;
            background:rgba(255,255,255,.1); border-radius:999px;
            transition:.3s;
        }
        .slider::before {
            content:""; position:absolute;
            width:18px; height:18px; left:3px; bottom:3px;
            background:#fff; border-radius:50%; transition:.3s;
        }
        input:checked + .slider { background: #22c55e; }
        input:checked + .slider::before { transform: translateX(20px); }
        .section-title {
            font-size:.7rem; text-transform:uppercase; color:#64748b;
            font-weight:700; letter-spacing:.08em; margin:.5rem 0 1rem;
            border-bottom:1px solid rgba(255,255,255,.06); padding-bottom:.5rem;
        }
    </style>
</head>
<body>
<div layout:fragment="content">

    <div class="page-header">
        <div>
            <h1>
                <svg fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="inline-icon">
                    <path stroke-linecap="round" stroke-linejoin="round"
                          d="m16.862 4.487 1.687-1.688a1.875 1.875 0 1 1 2.652 2.652L10.582 16.07a4.5 4.5 0 0 1-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 0 1 1.13-1.897l8.932-8.931Zm0 0L19.5 7.125"/>
                </svg>
                Edit User
            </h1>
            <p class="text-secondary">
                Editing: <strong th:text="${editUser.name}" style="color:#e2e8f0;">Name</strong>
                &nbsp;·&nbsp;
                <span class="role-pill role-badge-ADMIN"
                      th:classappend="'role-badge-' + ${editUser.role}"
                      th:text="${editUser.role}" style="font-size:.7rem; padding:.15rem .5rem;">ROLE</span>
            </p>
        </div>
        <a th:href="@{/users}" class="btn btn-secondary">← Back to Users</a>
    </div>

    <div style="max-width: 580px; margin: 0 auto;">

        <!-- Error banner -->
        <div th:if="${error}"
             style="background:rgba(239,68,68,.15); border:1px solid rgba(239,68,68,.35); border-radius:.75rem;
                    padding:.85rem 1.2rem; margin-bottom:1rem; color:#f87171; font-size:.9rem;">
            ⚠ <span th:text="${error}">Error</span>
        </div>

        <div class="card">
            <form method="POST" th:action="@{/users/{id}/edit(id=${editUser.userId})}">

                <!-- ── Profile ── -->
                <p class="section-title">Profile</p>

                <div class="form-group">
                    <label class="form-label">Full Name</label>
                    <input type="text" name="name" class="form-control"
                           th:value="${editUser.name}" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="email" name="email" class="form-control"
                           th:value="${editUser.email}" required>
                </div>

                <!-- ── Role & Status ── -->
                <p class="section-title" style="margin-top:1.5rem;">Role &amp; Status</p>

                <div class="form-group">
                    <label class="form-label">Role / Access Level</label>
                    <select name="role" class="form-control" required>
                        <option value="ADMIN"
                                th:selected="${editUser.role == 'ADMIN'}">Admin — Full access</option>
                        <option value="MANAGER"
                                th:selected="${editUser.role == 'MANAGER'}">Manager — Finance, analytics &amp; projects</option>
                        <option value="EMPLOYEE"
                                th:selected="${editUser.role == 'EMPLOYEE'}">Employee — Material purchases only</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label">Account Status</label>
                    <div class="toggle-wrap">
                        <label class="toggle">
                            <input type="checkbox" name="is_active" value="true"
                                   th:checked="${editUser.active}">
                            <span class="slider"></span>
                        </label>
                        <span style="font-size:.9rem; color:#94a3b8;">
                            Active &mdash; user can log in
                        </span>
                    </div>
                </div>

                <!-- ── Password Reset ── -->
                <p class="section-title" style="margin-top:1.5rem;">Password Reset
                    <span style="font-weight:400; font-size:.75rem; color:#475569;">
                        (leave blank to keep current)
                    </span>
                </p>

                <div class="form-group">
                    <label class="form-label">New Password</label>
                    <input type="password" name="new_password" class="form-control"
                           placeholder="New password (min 8 chars)" minlength="8" autocomplete="new-password">
                </div>

                <div class="form-group">
                    <label class="form-label">Confirm New Password</label>
                    <input type="password" name="confirm_password" class="form-control"
                           placeholder="Re-enter new password" autocomplete="new-password">
                </div>

                <!-- ── Actions ── -->
                <div style="display:flex; gap:1rem; margin-top:1.75rem;">
                    <button type="submit" class="btn btn-primary" style="flex:1;">
                        <svg fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="inline-icon">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                  d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"/>
                        </svg>
                        Save Changes
                    </button>
                    <a th:href="@{/users}" class="btn btn-secondary" style="flex:1; text-align:center;">
                        Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>

</div>
</body>
</html>
