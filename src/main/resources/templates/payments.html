<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{base}">
<head>
    <title>Elite Page</title>
</head>
<body>
    <div layout:fragment="content">


Vendor Payments




<div class="container fade-in">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
        <div>
            <h1><svg fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="inline-icon"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 18 9 11.25l4.306 4.306a11.95 11.95 0 0 1 5.814-5.518l2.74-1.22M21.75 8.814v4.5A.75.75 0 0 1 21 14.064H16.5" /></svg> Vendor Payments</h1>
            <p class="text-secondary">Record payments to vendors</p>
        </div>
        <div style="display: flex; gap: 1rem; align-items: center;">
            <button class="btn btn-success" onclick="exportVendorPaymentsToExcel()"><svg fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="inline-icon"><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 14.25v-2.625a3.375 3.375 0 0 0-3.375-3.375h-1.5A1.125 1.125 0 0 1 13.5 7.125v-1.5a3.375 3.375 0 0 0-3.375-3.375H8.25m.75 12 3 3m0 0 3-3m-3 3v-6m-1.5-9H5.625c-.621 0-1.125.504-1.125 1.125v17.25c0 .621.504 1.125 1.125 1.125h12.75c.621 0 1.125-.504 1.125-1.125V11.25a9 9 0 0 0-9-9Z" /></svg> Export to Excel</button>
            <button class="btn btn-primary" onclick="prepareAddPayment()">+ Add Payment</button>
        </div>
    </div>

    <div class="card">
        <div class="card-body">
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>
                                Vendor
                                <select id="header-filter-vendor" class="form-control form-control-sm mt-1"
                                    onchange="filterPayments()" style="width: 100%; min-width: 120px;">
                                    <option value="">All Vendors</option>
                                </select>
                            </th>
                            <th>
                                Project
                                <select id="header-filter-project" class="form-control form-control-sm mt-1"
                                    onchange="filterPayments()" style="width: 100%; min-width: 120px;">
                                    <option value="">All Projects</option>
                                </select>
                            </th>
                            <th>
                                Date Range
                                <input type="text" id="header-filter-date" class="form-control form-control-sm mt-1"
                                    placeholder="Select range..." readonly
                                    style="background: var(--bg-secondary); cursor: pointer;">
                            </th>
                            <th>Amount</th>
                            <th>
                                Payment Mode
                                <select id="header-filter-mode" class="form-control form-control-sm mt-1"
                                    onchange="filterPayments()" style="width: 100%; min-width: 100px;">
                                    <option value="">All Modes</option>
                                    <option value="CASH">Cash</option>
                                    <option value="BANK">Bank</option>
                                    <option value="UPI">UPI</option>
                                </select>
                            </th>
                            <th>
                                Invoice Ref
                                <input type="text" id="header-filter-invoice" class="form-control form-control-sm mt-1"
                                    placeholder="Search..." oninput="filterPayments()"
                                    style="width: 100%; min-width: 100px;">
                            </th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="payments-tbody">
                        <tr>
                            <td colspan="7" class="text-center">Loading...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- Add Payment Modal -->
<div id="add-payment-modal" class="modal">
    <div class="modal-content modal-full">
        <div class="modal-header">
            <div class="flex align-center gap-2">
                <button class="btn btn-secondary" onclick="closeModal('add-payment-modal')"
                    style="padding: 0.5rem 1rem;">
                    ← Back
                </button>
                <h3 id="modal-title" style="margin: 0;">Record Vendor Payment</h3>
            </div>
        </div>
        <div class="modal-body">
            <form id="payment-form">
                
                <div class="grid grid-2">
                    <div class="form-group">
                        <label class="form-label">Vendor *</label>
                        <select id="payment-vendor" class="form-control" required onchange="fetchOutstanding()">
                            <option value="">-- Select Vendor --</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Project *</label>
                        <select id="payment-project" class="form-control" required onchange="fetchOutstanding()">
                            <option value="">-- Select Project --</option>
                        </select>
                    </div>
                </div>

                <!-- Outstanding Balance Banner -->
                <div id="outstanding-banner"
                    style="display:none; margin-bottom: 1rem; padding: 0.85rem 1.1rem; border-radius: 8px; background: var(--bg-secondary); border-left: 4px solid var(--warning);">
                    <div
                        style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:0.5rem;">
                        <div id="outstanding-vendor-text" style="font-size:0.9rem; color:var(--text-secondary);"></div>
                        <div id="outstanding-project-text" style="font-size:0.9rem; color:var(--text-secondary);"></div>
                    </div>
                    <div id="outstanding-error"
                        style="display:none; margin-top:0.5rem; color:var(--danger); font-weight:600; font-size:0.9rem;">
                    </div>
                </div>

                <div class="grid grid-2">
                    <div class="form-group">
                        <label class="form-label">Amount *</label>
                        <input type="text" id="payment-amount" class="form-control amount-input" required
                            placeholder="0">
                    </div>

                    <div class="form-group">
                        <label class="form-label">Payment Mode *</label>
                        <select id="payment-mode" class="form-control" required>
                            <option value="CASH">Cash</option>
                            <option value="BANK">Bank</option>
                            <option value="UPI">UPI</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Payment Date *</label>
                    <input type="date" id="payment-date" class="form-control" required>
                </div>

                <div class="flex gap-2">
                    <button type="submit" class="btn btn-primary">Save Payment</button>
                    <button type="button" class="btn btn-secondary"
                        onclick="closeModal('add-payment-modal')">Cancel</button>
                </div>
            </form>
        </div>
    </div>
</div>



<script>
    let payments = [];
    let allPayments = []; // Store all payments for filtering
    let vendors = [];
    let projects = [];

    async function loadData() {
        try {
            const [paymentsRes, vendorsRes, projectsRes] = await Promise.all([
                fetch("/api_payments_list"),
                fetch("/api_vendors_list"),
                fetch("/api_projects_list")
            ]);

            payments = await paymentsRes.json();
            allPayments = [...payments]; // Store all payments
            vendors = await vendorsRes.json();
            projects = await projectsRes.json();

            // Populate dropdowns
            document.getElementById('payment-vendor').innerHTML = '<option value="">-- Select Vendor --</option>' +
                vendors.map(v => `<option value="${v.vendor_id}">${v.name}</option>`).join('');

            document.getElementById('payment-project').innerHTML = '<option value="">-- Select Project --</option>' +
                projects.map(p => `<option value="${p.project_id}">${p.name}</option>`).join('');

            // Populate header filters
            document.getElementById('header-filter-vendor').innerHTML = '<option value="">All Vendors</option>' +
                vendors.map(v => `<option value="${v.vendor_id}">${v.name}</option>`).join('');

            document.getElementById('header-filter-project').innerHTML = '<option value="">All Projects</option>' +
                projects.map(p => `<option value="${p.project_id}">${p.name}</option>`).join('');

            initDateRangePicker('#header-filter-date', filterPayments);

            renderPayments();
        } catch (error) {
            console.error('Error loading data:', error);
        }
    }

    function filterPayments() {
        const vendorId = document.getElementById('header-filter-vendor').value;
        const projectId = document.getElementById('header-filter-project').value;
        const mode = document.getElementById('header-filter-mode').value;
        const dateRangeStr = document.getElementById('header-filter-date').value;
        const invoiceSearch = document.getElementById('header-filter-invoice').value.toLowerCase();

        let dateFrom = null;
        let dateTo = null;

        if (dateRangeStr && dateRangeStr.includes(' to ')) {
            [dateFrom, dateTo] = dateRangeStr.split(' to ');
        } else if (dateRangeStr) {
            dateFrom = dateTo = dateRangeStr;
        }

        payments = allPayments.filter(p => {
            const matchVendor = !vendorId || String(p.vendor_id) === String(vendorId);
            const matchProject = !projectId || String(p.project_id) === String(projectId);
            const matchMode = !mode || p.payment_mode === mode;

            let matchDate = true;
            if (dateFrom && p.payment_date < dateFrom) matchDate = false;
            if (dateTo && p.payment_date > dateTo) matchDate = false;

            const matchInvoice = !invoiceSearch || (p.purchase_invoice && p.purchase_invoice.toLowerCase().includes(invoiceSearch));

            return matchVendor && matchProject && matchMode && matchDate && matchInvoice;
        });

        renderPayments();
    }

    // Helper for payment badges
    function getPaymentBadgeHTML(mode) {
        let badgeClass = 'status-secondary'; // Default gray

        if (mode === 'CASH') {
            badgeClass = 'status-completed'; // Green
        } else if (mode === 'BANK' || mode === 'UPI') {
            badgeClass = 'status-active'; // Blue
        } else if (mode === 'CREDIT') {
            badgeClass = 'status-on_hold'; // Orange/Yellow
        }

        return `<span class="status-badge ${badgeClass}">${mode}</span>`;
    }

    function renderPayments() {
        const tbody = document.getElementById('payments-tbody');

        if (payments.length === 0) {
            tbody.innerHTML = '<tr><td colspan="7" class="text-center">No payments found</td></tr>';
            return;
        }

        tbody.innerHTML = payments.map(p => {
            const vendor = vendors.find(v => v.vendor_id === p.vendor_id);
            const project = projects.find(pr => pr.project_id === p.project_id);
            return `
            <tr id="row-${p.payment_id}">
                <td><strong>${vendor ? vendor.name : 'Unknown'}</strong></td>
                <td>${project ? project.name : 'Unknown'}</td>
                <td>${formatDate(p.payment_date)}</td>
                <td><strong>${formatCurrency(p.amount)}</strong></td>
                <td>${getPaymentBadgeHTML(p.payment_mode)}</td>
                <td>${p.purchase_invoice || '-'}</td>
                <td style="white-space: nowrap;">
                    <button class="btn btn-sm btn-secondary" onclick="openEditPayment('${p.payment_id}')" style="margin-right: 0.5rem;">Edit</button>
                    <button class="btn btn-sm btn-danger" onclick="deletePayment('${p.payment_id}')">Delete</button>
                </td>
            </tr>
        `;
        }).join('');
    }

    // Track current outstanding values
    let currentVendorOutstanding = null;
    let currentProjectOutstanding = null;
    let editingPaymentId = null; // null = Add mode, set = Edit mode

    async function fetchOutstanding() {
        const vendorId = document.getElementById('payment-vendor').value;
        const projectId = document.getElementById('payment-project').value;
        const banner = document.getElementById('outstanding-banner');
        const vendorText = document.getElementById('outstanding-vendor-text');
        const projectText = document.getElementById('outstanding-project-text');
        const errDiv = document.getElementById('outstanding-error');

        currentVendorOutstanding = null;
        currentProjectOutstanding = null;
        errDiv.style.display = 'none';

        if (!vendorId) {
            banner.style.display = 'none';
            return;
        }

        try {
            let url = `/api_vendor_outstanding?vendor_id=${vendorId}`;
            if (projectId) url += `&project_id=${projectId}`;
            const res = await fetch(url);
            if (!res.ok) { banner.style.display = 'none'; return; }
            const d = await res.json();

            currentVendorOutstanding = d.total_outstanding;
            vendorText.innerHTML = `<strong>${d.vendor_name}</strong> — Total Outstanding: <strong style="color:var(--warning)">${formatCurrency(d.total_outstanding)}</strong>`;

            if (projectId && d.project_outstanding !== undefined) {
                currentProjectOutstanding = d.project_outstanding;
                projectText.innerHTML = `Outstanding for <strong>${d.project_name || 'this project'}</strong>: <strong style="color:var(--warning)">${formatCurrency(d.project_outstanding)}</strong>`;
            } else {
                projectText.innerHTML = '';
                currentProjectOutstanding = null;
            }

            banner.style.display = 'block';
        } catch (err) {
            banner.style.display = 'none';
        }
    }

    // Helper: set select value safely (handles TomSelect-wrapped and plain selects)
    function setVal(id, value) {
        const el = document.getElementById(id);
        if (!el) return;
        const v = String(value ?? '');
        if (el.tomselect) el.tomselect.setValue(v);
        else el.value = v;
    }

    async function openEditPayment(id) {
        editingPaymentId = id;
        document.getElementById('modal-title').textContent = 'Edit Vendor Payment';
        document.getElementById('outstanding-banner').style.display = 'none';
        document.getElementById('outstanding-error').style.display = 'none';
        currentVendorOutstanding = null;
        currentProjectOutstanding = null;

        // Use local data — no extra API call needed
        const p = allPayments.find(p => String(p.payment_id) === String(id));
        if (!p) { showNotification('Payment not found', 'error'); return; }

        setVal('payment-vendor',  p.vendor_id);
        setVal('payment-project', p.project_id);
        setVal('payment-mode',    p.payment_mode);
        document.getElementById('payment-amount').value = p.amount;
        document.getElementById('payment-date').value   = p.payment_date;

        openModal('add-payment-modal');
    }

    document.getElementById('payment-form').addEventListener('submit', async (e) => {
        e.preventDefault();

        const amount = parseAmount(document.getElementById('payment-amount').value);
        const errDiv = document.getElementById('outstanding-error');
        errDiv.style.display = 'none';

        // Validate amount against outstanding
        const limitToCheck = currentProjectOutstanding !== null ? currentProjectOutstanding : currentVendorOutstanding;
        if (limitToCheck !== null && amount > limitToCheck) {
            errDiv.textContent = `Payment amount exceeds the outstanding balance of ${formatCurrency(limitToCheck)}. Please enter a lower amount.`;
            errDiv.style.display = 'block';
            document.getElementById('outstanding-banner').style.display = 'block';
            return;
        }

        const data = {
            vendor_id: document.getElementById('payment-vendor').value,
            project_id: document.getElementById('payment-project').value,
            amount: amount,
            payment_mode: document.getElementById('payment-mode').value,
            payment_date: document.getElementById('payment-date').value
        };

        try {
            let url, method;
            if (editingPaymentId) {
                url = "/api_payments_list/" + editingPaymentId;
                method = 'PUT';
            } else {
                url = "/api_payments_list";
                method = 'POST';
            }
            const response = await fetch(url, {
                method: method,
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(data)
            });

            if (response.ok) {
                showNotification(editingPaymentId ? 'Payment updated successfully' : 'Payment recorded successfully', 'success');
                closeModal('add-payment-modal');
                resetForm('payment-form');
                editingPaymentId = null;
                currentVendorOutstanding = null;
                currentProjectOutstanding = null;
                loadData();
            } else {
                const errData = await response.json();
                showNotification(errData.error || 'Error saving payment', 'error');
            }
        } catch (error) {
            console.error('Error:', error);
            showNotification('Error saving payment', 'error');
        }
    });

    async function deletePayment(id) {
        if (!confirm('Are you sure you want to delete this payment?')) return;

        try {
            const url = "/api_payments_list/" + id;
            const response = await fetch(url, {
                method: 'DELETE'
            });

            if (response.ok) {
                showNotification('Payment deleted', 'success');
                loadData();
            } else {
                showNotification('Error deleting payment', 'error');
            }
        } catch (error) {
            console.error('Error:', error);
            showNotification('Error deleting payment', 'error');
        }
    }

    function prepareAddPayment() {
        editingPaymentId = null;
        document.getElementById('modal-title').textContent = 'Record Vendor Payment';
        resetForm('payment-form');
        document.getElementById('payment-date').value = new Date().toISOString().split('T')[0];
        document.getElementById('outstanding-banner').style.display = 'none';
        document.getElementById('outstanding-error').style.display = 'none';
        currentVendorOutstanding = null;
        currentProjectOutstanding = null;
        openModal('add-payment-modal');
    }

    // Export payments to Excel
    // Export payments to Excel
    function exportVendorPaymentsToExcel() {
        const dateFrom = document.getElementById('header-filter-date-from')?.value || '';
        const dateTo = document.getElementById('header-filter-date-to')?.value || '';
        const project = document.getElementById('header-filter-project')?.value || '';
        const vendor = document.getElementById('header-filter-vendor')?.value || '';

        // Build query string
        const params = new URLSearchParams();
        if (dateFrom) params.append('date_from', dateFrom);
        if (dateTo) params.append('date_to', dateTo);
        if (project) params.append('project', project);
        if (vendor) params.append('vendor', vendor);

        downloadExcel("/export_vendor_payments?" + params.toString(), "vendor_payments.xlsx");

        showNotification('Exporting vendor payments data...', 'success');
    }

    document.getElementById('payment-date').value = new Date().toISOString().split('T')[0];

    async function checkUrlParams() {
        const params = new URLSearchParams(window.location.search);
        const editId = params.get('edit_id');
        const highlightId = params.get('highlight_id');

        if (editId) {
            let attempts = 0;
            while (payments.length === 0 && attempts < 10) {
                await new Promise(r => setTimeout(r, 200));
                attempts++;
            }
            if (payments.length > 0) {
                openEditPayment(editId);
                // Clean URL
                window.history.replaceState({}, document.title, window.location.pathname);
            }
        } else if (highlightId) {
            let attempts = 0;
            while (payments.length === 0 && attempts < 10) {
                await new Promise(r => setTimeout(r, 200));
                attempts++;
            }
            setTimeout(() => {
                const row = document.getElementById('row-' + highlightId);
                if (row) {
                    row.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    row.classList.add('highlight-row-pulse');
                    window.history.replaceState({}, document.title, window.location.pathname);
                }
            }, 500);
        }
    }

    loadData().then(() => {
        checkUrlParams();
    });
</script>

    </div>
</body>
</html>
