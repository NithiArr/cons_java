<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Access Denied – Elite Build</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--bg-primary, #0f172a); font-family: 'Outfit', sans-serif; }
        .denied-card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 1.5rem;
            padding: 3rem 4rem;
            text-align: center;
            max-width: 480px;
        }
        .denied-icon { font-size: 4rem; margin-bottom: 1rem; }
        h1 { color: #f87171; font-size: 2rem; margin: 0 0 0.5rem; }
        p  { color: #94a3b8; margin: 0 0 2rem; }
        .btn-back {
            display: inline-block;
            padding: 0.75rem 2rem;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: #fff;
            border-radius: 0.75rem;
            text-decoration: none;
            font-weight: 600;
            transition: opacity .2s;
        }
        .btn-back:hover { opacity: .85; }
        .role-info { margin-top: 1.5rem; font-size: 0.85rem; color: #475569; }
    </style>
</head>
<body>
    <div class="denied-card">
        <div class="denied-icon">🔒</div>
        <h1>Access Denied</h1>
        <p>You don't have permission to view this page.<br>Please contact your administrator.</p>
        <a th:href="@{/}" class="btn-back">← Go to Dashboard</a>
        <div class="role-info">
            Logged in as: <strong th:text="${#authentication.principal.name}">User</strong>
            &nbsp;|&nbsp; Role: <strong th:text="${#authentication.principal.role}">ROLE</strong>
        </div>
    </div>
</body>
</html>
