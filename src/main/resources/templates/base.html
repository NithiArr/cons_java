<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title layout:title-pattern="$CONTENT_TITLE - Elite Build">Elite Build Management</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/css/tom-select.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    
    <style>
        /* Elite Build Global Premium Dashboard Overrides */
        body {
            font-family: 'Outfit', sans-serif;
            background: #020617; /* Very Dark base */
            color: #f8fafc;
            margin: 0;
            overflow-x: hidden;
            position: relative;
        }

        /* Abstract Premium Background Orbs for the Interface */
        body::before {
            content: '';
            position: fixed;
            top: -200px;
            left: -100px;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(79, 70, 229, 0.4) 0%, rgba(2, 6, 23, 0) 70%);
            border-radius: 50%;
            z-index: -1;
            animation: pulse-orb 15s infinite alternate ease-in-out;
        }

        body::after {
            content: '';
            position: fixed;
            bottom: -200px;
            right: -100px;
            width: 700px;
            height: 700px;
            background: radial-gradient(circle, rgba(139, 92, 246, 0.3) 0%, rgba(2, 6, 23, 0) 70%);
            border-radius: 50%;
            z-index: -1;
            animation: pulse-orb 20s infinite alternate-reverse ease-in-out;
        }

        @keyframes pulse-orb {
            0% { transform: scale(1) translate(0, 0); }
            100% { transform: scale(1.2) translate(50px, -50px); opacity: 0.8;}
        }

        .main-layout {
            display: flex;
            min-height: 100vh;
            background: transparent;
        }

        /* Elite Glassmorphism Sidebar */
        .sidebar {
            width: 280px;
            background: rgba(15, 23, 42, 0.4) !important;
            backdrop-filter: blur(25px) !important;
            -webkit-backdrop-filter: blur(25px) !important;
            border-right: 1px solid rgba(255, 255, 255, 0.08) !important;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            padding: 2rem 1.5rem;
            z-index: 1000;
        }
        
        .sidebar::-webkit-scrollbar { width: 4px; }
        .sidebar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

        .main-content {
            flex: 1;
            margin-left: 280px;
            padding: 3rem 2rem;
            z-index: 1;
        }

        /* User Header Premium */
        .user-info {
            background: linear-gradient(135deg, rgba(79, 70, 229, 0.1), rgba(139, 92, 246, 0.1));
            border: 1px solid rgba(139, 92, 246, 0.2);
            border-radius: 16px;
            padding: 1.25rem;
            margin-bottom: 2.5rem;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.3);
        }
        
        .user-name {
            font-weight: 700;
            font-size: 1.15rem;
            background: linear-gradient(to right, #fff, #c4b5fd);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .user-role {
            font-size: 0.85rem;
            color: #94a3b8;
            margin-top: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .role-badge {
            background: rgba(139, 92, 246, 0.3);
            color: #e2e8f0;
            padding: 2px 8px;
            border-radius: 8px;
            font-size: 0.7rem;
            font-weight: 600;
            border: 1px solid rgba(139, 92, 246, 0.5);
            letter-spacing: 0.5px;
        }

        /* Premium Nav Links */
        .nav-menu { list-style: none; padding: 0; }
        .nav-item { margin-bottom: 0.65rem; }
        .nav-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0.85rem 1.25rem;
            color: #cbd5e1;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 500;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .nav-link:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.05);
            transform: translateX(4px);
        }

        .nav-link.active {
            background: linear-gradient(135deg, rgba(79, 70, 229, 0.8), rgba(139, 92, 246, 0.8));
            color: white;
            box-shadow: 0 4px 15px rgba(79, 70, 229, 0.4);
        }

        .nav-link svg {
            width: 22px;
            height: 22px;
            stroke-width: 1.8;
            opacity: 0.8;
        }
        .nav-link:hover svg { opacity: 1; stroke: #a78bfa; }
        .nav-link.active svg { stroke: #fff; opacity: 1; }

        .btn-primary {
            background: linear-gradient(135deg, #4f46e5, #8b5cf6) !important;
            border: none;
            box-shadow: 0 4px 15px rgba(79, 70, 229, 0.4) !important;
            font-weight: 600;
            border-radius: 10px;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(79, 70, 229, 0.6) !important;
        }

        .card, .modal-content {
            background: rgba(15, 23, 42, 0.6) !important;
            backdrop-filter: blur(20px) !important;
            -webkit-backdrop-filter: blur(20px) !important;
            border: 1px solid rgba(255, 255, 255, 0.1) !important;
            border-top: 1px solid rgba(255, 255, 255, 0.2) !important;
            border-radius: 20px !important;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.6) !important;
        }

        table { background: transparent !important; border-radius: 12px; }
        th { background: rgba(0,0,0,0.3) !important; color: #a5b4fc !important; font-weight: 600; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 0.5px;}
        tr:hover { background: rgba(255, 255, 255, 0.03) !important; }
        td { border-bottom: 1px solid rgba(255,255,255,0.05) !important; }

        @keyframes highlightPulse {
            0% { background-color: rgba(99, 102, 241, 0.7); }
            100% { background-color: rgba(255, 255, 255, 0); }
        }
        .highlight-row-pulse {
            animation: highlightPulse 3s ease-out forwards;
        }

        input, select {
            background: rgba(0, 0, 0, 0.25) !important;
            border: 1px solid rgba(255,255,255,0.1) !important;
            color: #fff !important;
            border-radius: 10px !important;
            backdrop-filter: blur(10px);
        }
        input:focus { border-color: #8b5cf6 !important; box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.2) !important; }

        /* Dashboard specific premium overwrites */
        .kpi-card {
            background: rgba(255, 255, 255, 0.03) !important;
            border-top: 1px solid rgba(255, 255, 255, 0.1) !important;
            border-radius: 20px !important;
        }
        
        .kpi-value {
            background: linear-gradient(to right, #a78bfa, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800 !important;
        }
    </style>
</head>

<body>
    <div class="main-layout">
        <!-- Modern Glass Sidebar -->
        <aside class="sidebar">
            <div class="user-info">

            <nav>

                            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M13.5 21v-7.5a.75.75 0 0 1 .75-.75h3a.75.75 0 0 1 .75.75V21m-4.5 0H2.36m11.14 0H18m0 0h3.64m-1.39 0V9.349M3.75 21V9.349m0 0a3.001 3.001 0 0 0 3.75-.615A2.993 2.993 0 0 0 9.75 9.75c.896 0 1.7-.393 2.25-1.016a2.993 2.993 0 0 0 2.25 1.016 2.993 2.993 0 0 0 2.25-1.016 3.001 3.001 0 0 0 3.75.614m-16.5 0a3.004 3.004 0 0 1-.621-4.72l1.189-1.19A1.5 1.5 0 0 1 5.378 3h13.243a1.5 1.5 0 0 1 1.06.44l1.19 1.189a3 3 0 0 1-.621 4.72M6.75 18h3.75a.75.75 0 0 0 .75-.75V13.5a.75.75 0 0 0-.75-.75H6.75a.75.75 0 0 0-.75.75v3.75c0 .414.336.75.75.75Z" /></svg>
                            Vendors
                        </a>
                    </li>

                    <!-- ALL: Material Purchases -->
                    <li class="nav-item" style="margin-top: 1rem;">
                        <span style="display:block; font-size:0.7rem; text-transform:uppercase; color:#64748b; font-weight:700; margin-left: 1rem; margin-bottom: 0.5rem; letter-spacing:1px;">Finance</span>
                        <a th:href="@{/purchases}" class="nav-link" id="nav-purchases">
                            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 3h1.386c.51 0 .955.343 1.087.835l.383 1.437M7.5 14.25a3 3 0 0 0-3 3h15.75m-12.75-3h11.218c1.121-2.3 2.1-4.684 2.924-7.138a60.114 60.114 0 0 0-16.536-1.84M7.5 14.25 5.106 5.272M6 20.25a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0Zm12.75 0a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0Z" /></svg>
                            Material Purchases
                        </a>
                    </li>

                    <!-- MANAGER + ADMIN: Expenses -->
                    <li class="nav-item" sec:authorize="hasAnyRole('ADMIN','MANAGER')">
                        <a th:href="@{/expenses}" class="nav-link" id="nav-expenses">
                            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 8.25h19.5M2.25 9h19.5m-16.5 5.25h6m-6 2.25h3m-3.75 3h15a2.25 2.25 0 0 0 2.25-2.25V6.75A2.25 2.25 0 0 0 19.5 4.5h-15a2.25 2.25 0 0 0-2.25 2.25v10.5A2.25 2.25 0 0 0 4.5 19.5Z" /></svg>

                    <li class="nav-item" sec:authorize="hasAnyRole('ADMIN','MANAGER')">
                        <a th:href="@{/payments}" class="nav-link" id="nav-payments">
                            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 18 9 11.25l4.306 4.306a11.95 11.95 0 0 1 5.814-5.518l2.74-1.22M21.75 8.814v4.5A.75.75 0 0 1 21 14.064H16.5" /></svg>
                            Vendor Settlements
                        </a>
                    </li>

                    <!-- MANAGER + ADMIN: Client Advances -->
                    <li class="nav-item" sec:authorize="hasAnyRole('ADMIN','MANAGER')">
                        <a th:href="@{/client_payments}" class="nav-link" id="nav-client-payments">
                            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 6 9 12.75l4.286-4.286a11.948 11.948 0 0 1 4.306 6.43l.776 2.898m0 0 3.182-5.514m-3.182 5.514-5.514-3.182" /></svg>
                            Client Advances
                        </a>
                    </li>

                    <!-- MANAGER + ADMIN: Analytics section -->
                    <li class="nav-item" style="margin-top: 1rem;" sec:authorize="hasAnyRole('ADMIN','MANAGER')">
                        <span style="display:block; font-size:0.7rem; text-transform:uppercase; color:#64748b; font-weight:700; margin-left: 1rem; margin-bottom: 0.5rem; letter-spacing:1px;">Analytics</span>
                        <a th:href="@{/dashboard/daily-cash}" class="nav-link" id="nav-daily-cash">
                            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 18.75a60.07 60.07 0 0 1 15.797 2.101c.727.198 1.453-.342 1.453-1.096V4.24a1.125 1.125 0 0 0-1.453-1.096 60.07 60.07 0 0 0-15.797 2.101c-.727.198-1.453-.342-1.453-1.096V18.75Z" /></svg>

                        </a>
                    </li>
                    <li class="nav-item" sec:authorize="hasAnyRole('ADMIN','MANAGER')">
                        <a th:href="@{/dashboard/vendor-analytics}" class="nav-link" id="nav-vendor-analytics">

                            Vendor Analytics
                        </a>
                    </li>

                    <!-- ADMIN ONLY: Settings section -->
                    <li class="nav-item" style="margin-top: 1rem;" sec:authorize="hasRole('ADMIN')">
                        <span style="display:block; font-size:0.7rem; text-transform:uppercase; color:#64748b; font-weight:700; margin-left: 1rem; margin-bottom: 0.5rem; letter-spacing:1px;">Settings</span>
                        <a th:href="@{/master-categories}" class="nav-link" id="nav-master-categories">
                            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.325.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 0 1 1.37.49l1.296 2.247a1.125 1.125 0 0 1-.26 1.431l-1.003.827c-.293.241-.438.613-.43.992a7.723 7.723 0 0 1 0 .255c-.008.378.137.75.43.991l1.004.827c.424.35.534.955.26 1.43l-1.298 2.247a1.125 1.125 0 0 1-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.47 6.47 0 0 1-.22.128c-.331.183-.581.495-.644.869l-.213 1.281c-.09.543-.56.94-1.11.94h-2.594c-.55 0-1.019-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 0 1-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 0 1-1.369-.49l-1.297-2.247a1.125 1.125 0 0 1 .26-1.431l1.004-.827c.292-.24.437-.613.43-.991a6.932 6.932 0 0 1 0-.255c.007-.38-.138-.751-.43-.992l-1.004-.827a1.125 1.125 0 0 1-.26-1.43l1.297-2.247a1.125 1.125 0 0 1 1.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.086.22-.128.332-.183.582-.495.644-.869l.214-1.28Z" /><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" /></svg>
                            Master Categories

                    </li>
                    <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                        <a th:href="@{/users}" class="nav-link" id="nav-users">

                            Manage Users
                        </a>
                    </li>
                    <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                        <a th:href="@{/activity-log}" class="nav-link" id="nav-activity-log">
                            <svg fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12h3.75M9 15h3.75M9 18h3.75m3 .75H18a2.25 2.25 0 0 0 2.25-2.25V6.108c0-1.135-.845-2.098-1.976-2.192a48.424 48.424 0 0 0-1.123-.08m-5.801 0c-.065.21-.1.433-.1.664 0 .414.336.75.75.75h4.5a.75.75 0 0 0 .75-.75 2.25 2.25 0 0 0-.1-.664m-5.8 0A2.251 2.251 0 0 1 13.5 2.25H15c1.012 0 1.867.668 2.15 1.586m-5.8 0c-.376.023-.75.05-1.124.08C9.095 4.01 8.25 4.973 8.25 6.108V8.25m0 0H4.875c-.621 0-1.125.504-1.125 1.125v11.25c0 .621.504 1.125 1.125 1.125h9.75c.621 0 1.125-.504 1.125-1.125V9.375c0-.621-.504-1.125-1.125-1.125H8.25ZM6.75 12h.008v.008H6.75V12Zm0 3h.008v.008H6.75V15Zm0 3h.008v.008H6.75V18Z" /></svg>
                            Activity Log
                        </a>
                    </li>

                    <!-- ALL roles: Logout -->
                    <li class="nav-item" style="margin-top: 1rem;">
                        <a th:href="@{/logout}" class="nav-link" style="color: #fca5a5;">

                            Secure Logout
                        </a>
                    </li>
                </ul>
            </nav>
        </aside>

        <!-- Dynamic Page Content wrapped in Layout -->
        <main class="main-content" layout:fragment="content">
            <!-- Child pages will render here -->
        </main>
    </div>

    <!-- Active Link highlighter script -->
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const path = window.location.pathname;
            document.querySelectorAll('.nav-link').forEach(link => {
                if (link.getAttribute('href') === path && path !== '/') {
                    link.classList.add('active');
                }
            });
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tom-select@2.3.1/dist/js/tom-select.complete.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script th:src="@{/js/main.js(v=2)}"></script>
</body>
</html>
