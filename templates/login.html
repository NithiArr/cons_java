<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Construction Management System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .auth-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
        }

        .auth-card {
            max-width: 450px;
            width: 100%;
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .auth-header h1 {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .auth-tabs {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .auth-tab {
            flex: 1;
            padding: 0.75rem;
            background: var(--bg-tertiary);
            border: none;
            border-radius: 8px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .auth-tab.active {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
        }

        .auth-form {
            display: none;
        }

        .auth-form.active {
            display: block;
        }
    </style>
</head>

<body>
    <div class="auth-container">
        <div class="auth-card card glass">
            <div class="auth-header">
                <h1>🏗️ Construction Management</h1>
                <p class="text-secondary">Manage your construction projects efficiently</p>
            </div>

            <!-- Flash Messages -->
            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% for category, message in messages %}
            <div class="alert alert-{{ category }}">
                {{ message }}
            </div>
            {% endfor %}
            {% endif %}
            {% endwith %}

            <!-- Auth Tabs -->
            <div class="auth-tabs">
                <button class="auth-tab active" onclick="switchTab('login')">Login</button>
                <button class="auth-tab" onclick="switchTab('register')">Register</button>
            </div>

            <!-- Login Form -->
            <form id="login-form" class="auth-form active" method="POST" action="{{ url_for('auth.login') }}">
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" name="email" class="form-control" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control" required>
                </div>

                <button type="submit" class="btn btn-primary w-full">Login</button>
            </form>

            <!-- Register Form -->
            <form id="register-form" class="auth-form" method="POST" action="{{ url_for('auth.register') }}">
                <div class="form-group">
                    <label class="form-label">Full Name</label>
                    <input type="text" name="name" class="form-control" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" name="email" class="form-control" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Company</label>
                    <select name="company_option" class="form-control" onchange="toggleCompanyFields(this.value)"
                        required>
                        <option value="new">Create New Company</option>
                        {% if companies %}
                        <option value="existing">Join Existing Company</option>
                        {% endif %}
                    </select>
                </div>

                <div id="new-company-fields">
                    <div class="form-group">
                        <label class="form-label">Company Name</label>
                        <input type="text" name="company_name" class="form-control">
                    </div>

                    <div class="form-group">
                        <label class="form-label">Company Address</label>
                        <input type="text" name="company_address" class="form-control">
                    </div>

                    <div class="form-group">
                        <label class="form-label">Company Phone</label>
                        <input type="text" name="company_phone" class="form-control">
                    </div>

                    <div class="form-group">
                        <label class="form-label">Company Email</label>
                        <input type="email" name="company_email" class="form-control">
                    </div>
                </div>

                <div id="existing-company-fields" style="display: none;">
                    <div class="form-group">
                        <label class="form-label">Select Company</label>
                        <select name="company_id" class="form-control">
                            {% for company in companies %}
                            <option value="{{ company.company_id }}">{{ company.name }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Your Role</label>
                        <select name="role" class="form-control">
                            <option value="ADMIN">Admin</option>
                            <option value="MANAGER">Manager</option>
                            <option value="ACCOUNTANT">Accountant</option>
                            <option value="ENGINEER">Engineer</option>
                        </select>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary w-full">Register</button>
            </form>
        </div>
    </div>

    <script>
        function switchTab(tab) {
            const tabs = document.querySelectorAll('.auth-tab');
            const forms = document.querySelectorAll('.auth-form');

            tabs.forEach(t => t.classList.remove('active'));
            forms.forEach(f => f.classList.remove('active'));

            if (tab === 'login') {
                tabs[0].classList.add('active');
                document.getElementById('login-form').classList.add('active');
            } else {
                tabs[1].classList.add('active');
                document.getElementById('register-form').classList.add('active');
            }
        }

        function toggleCompanyFields(option) {
            const newFields = document.getElementById('new-company-fields');
            const existingFields = document.getElementById('existing-company-fields');

            if (option === 'new') {
                newFields.style.display = 'block';
                existingFields.style.display = 'none';
            } else {
                newFields.style.display = 'none';
                existingFields.style.display = 'block';
            }
        }
    </script>
</body>

</html>
