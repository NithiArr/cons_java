{% extends "base.html" %}

{% block title %}Expenses{% endblock %}

{% block content %}
<div class="container fade-in">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
        <div>
            <h1>💳 Expenses</h1>
            <p class="text-secondary">Track project expenses</p>
        </div>
        <div style="display: flex; gap: 1rem; align-items: center;">
            <button class="btn btn-primary" onclick="prepareAddExpense()">+ Add Expense</button>
        </div>
    </div>

    <div class="card">
        <div class="card-body">
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>
                                Project
                                <select id="header-filter-project" class="form-control form-control-sm mt-1"
                                    onchange="filterExpenses()" style="width: 100%; min-width: 150px;">
                                    <option value="">All Projects</option>
                                </select>
                            </th>
                            <th>
                                Category
                                <select id="header-filter-category" class="form-control form-control-sm mt-1"
                                    onchange="filterExpenses()" style="width: 100%; min-width: 120px;">
                                    <option value="">All Categories</option>
                                </select>
                            </th>
                            <th>Amount</th>
                            <th>Payment Mode</th>
                            <th>Date</th>
                            <th>Description</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="expenses-tbody">
                        <tr>
                            <td colspan="7" class="text-center">Loading...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- Add Expense Modal -->
<div id="add-expense-modal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="expense-modal-title">Add Expense</h3>
            <span class="close" onclick="closeModal('add-expense-modal')">&times;</span>
        </div>
        <div class="modal-body">
            <form id="expense-form">
                <input type="hidden" id="expense-id" value="">
                <div class="form-group">
                    <label class="form-label">Project *</label>
                    <select id="expense-project" class="form-control" required>
                        <option value="">-- Select Project --</option>
                    </select>
                </div>

                <div class="grid grid-2">
                    <div class="form-group">
                        <label class="form-label">Category *</label>
                        <select id="expense-category" class="form-control" onchange="updateDescriptionSuggestions()"
                            required>
                            <option value="">-- Select Category --</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Amount *</label>
                    <input type="number" id="expense-amount" class="form-control" required min="0" step="0.01">
                </div>

                <div class="grid grid-2">
                    <div class="form-group">
                        <label class="form-label">Payment Mode *</label>
                        <select id="expense-mode" class="form-control" required>
                            <option value="CASH">Cash</option>
                            <option value="BANK">Bank</option>
                            <option value="UPI">UPI</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Date *</label>
                        <input type="date" id="expense-date" class="form-control" required>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Description</label>
                    <label class="form-label">Description</label>
                    <input list="description-suggestions" id="expense-description" class="form-control"
                        placeholder="e.g., Mason, Painter">
                    <datalist id="description-suggestions"></datalist>
                </div>

                <div class="flex gap-2">
                    <button type="submit" class="btn btn-primary">Save Expense</button>
                    <button type="button" class="btn btn-secondary"
                        onclick="closeModal('add-expense-modal')">Cancel</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    let expenses = [];
    let allExpenses = []; // Store all expenses for filtering
    let projects = [];
    let masterCategories = [];

    async function loadData() {
        try {
            const [expensesRes, projectsRes, categoriesRes] = await Promise.all([
                fetch('/api/expenses'),
                fetch('/api/projects'),
                fetch('/api/master/categories?type=EXPENSE')
            ]);

            expenses = await expensesRes.json();
            allExpenses = [...expenses]; // Store all expenses
            projects = await projectsRes.json();
            masterCategories = await categoriesRes.json();

            // Populate category dropdown
            const categorySelect = document.getElementById('expense-category');
            categorySelect.innerHTML = '<option value="">-- Select Category --</option>' +
                masterCategories.map(c => `<option value="${c.name}">${c.name}</option>`).join('');

            // Populate project dropdown
            const select = document.getElementById('expense-project');
            select.innerHTML = '<option value="">-- Select Project --</option>' +
                projects.map(p => `<option value="${p.project_id}">${p.name}</option>`).join('');

            // Populate project filter
            document.getElementById('header-filter-project').innerHTML = '<option value="">All Projects</option>' +
                projects.map(p => `<option value="${p.project_id}">${p.name}</option>`).join('');

            populateExpenseFilters();
            renderExpenses();
        } catch (error) {
            console.error('Error loading data:', error);
        }
    }

    function populateExpenseFilters() {
        const categorySelect = document.getElementById('header-filter-category');
        // Use unique categories from actual data + master categories? sticking to actual data for filter
        const uniqueCategories = [...new Set(expenses.map(e => e.category))].sort();
        categorySelect.innerHTML = '<option value="">All Categories</option>' +
            uniqueCategories.map(c => `<option value="${c}">${c}</option>`).join('');
    }

    function filterExpenses() {
        const projectId = document.getElementById('header-filter-project').value;
        const category = document.getElementById('header-filter-category').value;

        const filteredExpenses = allExpenses.filter(e => {
            const matchProject = !projectId || e.project_id === projectId;
            const matchCategory = !category || e.category === category;
            return matchProject && matchCategory;
        });

        expenses = filteredExpenses;
        renderExpenses();
    }

    function renderExpenses() {
        const tbody = document.getElementById('expenses-tbody');

        if (expenses.length === 0) {
            tbody.innerHTML = '<tr><td colspan="7" class="text-center">No expenses found</td></tr>';
            return;
        }

        tbody.innerHTML = expenses.map(e => {
            const project = projects.find(p => p.project_id === e.project_id);
            return `
            <tr>
                <td>${project ? project.name : 'Unknown'}</td>
                <td>${e.category}</td>
                <td><strong>${formatCurrency(e.amount)}</strong></td>
                <td><span class="badge">${e.payment_mode}</span></td>
                <td>${formatDate(e.expense_date)}</td>
                <td>${e.description || '-'}</td>
                <td style="white-space: nowrap;">
                    <button class="btn btn-sm btn-primary" onclick="editExpense('${e.expense_id}')" style="margin-right: 0.5rem;">Edit</button>
                    <button class="btn btn-sm btn-danger" onclick="deleteExpense('${e.expense_id}')">Delete</button>
                </td>
            </tr>
            `;
        }).join('');
    }

    document.getElementById('expense-form').addEventListener('submit', async (e) => {
        e.preventDefault();

        const expenseId = document.getElementById('expense-id').value;
        const isEdit = expenseId !== '';

        const data = {
            project_id: document.getElementById('expense-project').value,
            category: document.getElementById('expense-category').value,
            amount: parseFloat(document.getElementById('expense-amount').value),
            payment_mode: document.getElementById('expense-mode').value,
            expense_date: document.getElementById('expense-date').value,
            description: document.getElementById('expense-description').value || null
        };

        try {
            const url = isEdit ? `/api/expenses/${expenseId}` : '/api/expenses';
            const method = isEdit ? 'PUT' : 'POST';

            const response = await fetch(url, {
                method: method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            if (response.ok) {
                showNotification(isEdit ? 'Expense updated successfully' : 'Expense added successfully', 'success');
                closeModal('add-expense-modal');
                resetForm('expense-form');
                document.getElementById('expense-id').value = '';
                document.getElementById('expense-modal-title').textContent = 'Add Expense';
                loadData();
            } else {
                showNotification(isEdit ? 'Error updating expense' : 'Error adding expense', 'error');
            }
        } catch (error) {
            console.error('Error:', error);
            showNotification('Error adding expense', 'error');
        }
    });

    async function editExpense(id) {
        try {
            // Fetch the expense data
            const response = await fetch(`/api/expenses/${id}`);
            if (!response.ok) throw new Error('Failed to fetch expense');

            const expense = await response.json();

            // Set the ID for update
            document.getElementById('expense-id').value = expense.expense_id;

            // Change modal title
            document.getElementById('expense-modal-title').textContent = 'Edit Expense';

            // Pre-fill the form
            document.getElementById('expense-project').value = expense.project_id;
            document.getElementById('expense-category').value = expense.category;
            updateDescriptionSuggestions(); // Populate datalist
            document.getElementById('expense-amount').value = expense.amount;
            document.getElementById('expense-mode').value = expense.payment_mode;
            document.getElementById('expense-date').value = expense.expense_date;
            document.getElementById('expense-description').value = expense.description || '';

            // Open modal
            openModal('add-expense-modal');
        } catch (error) {
            console.error('Error loading expense:', error);
            showNotification('Error loading expense data', 'error');
        }
    }

    async function deleteExpense(id) {
        if (!confirm('Are you sure you want to delete this expense?')) return;

        try {
            const response = await fetch(`/api/expenses/${id}`, { method: 'DELETE' });

            if (response.ok) {
                showNotification('Expense deleted', 'success');
                loadData();
            } else {
                showNotification('Error deleting expense', 'error');
            }
        } catch (error) {
            console.error('Error:', error);
            showNotification('Error deleting expense', 'error');
        }
    }

    function updateDescriptionSuggestions() {
        const categoryName = document.getElementById('expense-category').value;
        const selectedCategory = masterCategories.find(c => c.name === categoryName);
        const datalist = document.getElementById('description-suggestions');

        datalist.innerHTML = '';
        if (selectedCategory && selectedCategory.subcategories) {
            selectedCategory.subcategories.forEach(item => {
                const option = document.createElement('option');
                option.value = item.name;
                datalist.appendChild(option);
            });
        }
    }

    function prepareAddExpense() {
        resetForm('expense-form');
        document.getElementById('expense-id').value = '';
        document.getElementById('expense-modal-title').textContent = 'Add Expense';
        document.getElementById('expense-date').value = new Date().toISOString().split('T')[0];

        document.getElementById('expense-category').value = "";
        document.getElementById('description-suggestions').innerHTML = "";

        openModal('add-expense-modal');
    }

    // Set today's date as default
    document.getElementById('expense-date').value = new Date().toISOString().split('T')[0];

    loadData();
</script>
{% endblock %}
