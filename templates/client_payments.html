{% extends "base.html" %}

{% block title %}Client Payments{% endblock %}

{% block content %}
<div class="container fade-in">
    <div class="flex justify-between align-center mb-3">
        <div>
            <h1>💵 Client Payments</h1>
            <p class="text-secondary">Track incoming payments from clients</p>
        </div>
        <button class="btn btn-primary" onclick="openModal('add-client-payment-modal')">+ Add Client Payment</button>
    </div>

    <div class="card">
        <div class="card-body">
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Project</th>
                            <th>Amount</th>
                            <th>Payment Mode</th>
                            <th>Reference #</th>
                            <th>Date</th>
                            <th>Remarks</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="client-payments-tbody">
                        <tr>
                            <td colspan="7" class="text-center">Loading...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- Add Client Payment Modal -->
<div id="add-client-payment-modal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3>Record Client Payment</h3>
            <span class="close" onclick="closeModal('add-client-payment-modal')">&times;</span>
        </div>
        <div class="modal-body">
            <form id="client-payment-form">
                <div class="form-group">
                    <label class="form-label">Project *</label>
                    <select id="client-payment-project" class="form-control" required>
                        <option value="">-- Select Project --</option>
                    </select>
                </div>

                <div class="grid grid-2">
                    <div class="form-group">
                        <label class="form-label">Amount *</label>
                        <input type="number" id="client-payment-amount" class="form-control" required min="0"
                            step="0.01">
                    </div>

                    <div class="form-group">
                        <label class="form-label">Payment Mode *</label>
                        <select id="client-payment-mode" class="form-control" required>
                            <option value="CASH">Cash</option>
                            <option value="BANK">Bank</option>
                            <option value="UPI">UPI</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-2">
                    <div class="form-group">
                        <label class="form-label">Payment Date *</label>
                        <input type="date" id="client-payment-date" class="form-control" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Reference Number</label>
                        <input type="text" id="client-payment-ref" class="form-control"
                            placeholder="Cheque #, Transaction ID">
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Remarks</label>
                    <textarea id="client-payment-remarks" class="form-control" rows="2"></textarea>
                </div>

                <div class="flex gap-2">
                    <button type="submit" class="btn btn-primary">Save Payment</button>
                    <button type="button" class="btn btn-secondary"
                        onclick="closeModal('add-client-payment-modal')">Cancel</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    let clientPayments = [];
    let projects = [];

    async function loadData() {
        try {
            const [paymentsRes, projectsRes] = await Promise.all([
                fetch('/api/client-payments'),
                fetch('/api/projects')
            ]);

            clientPayments = await paymentsRes.json();
            projects = await projectsRes.json();

            // Populate project dropdown
            document.getElementById('client-payment-project').innerHTML = '<option value="">-- Select Project --</option>' +
                projects.map(p => `<option value="${p.project_id}">${p.name}</option>`).join('');

            renderClientPayments();
        } catch (error) {
            console.error('Error loading data:', error);
        }
    }

    function renderClientPayments() {
        const tbody = document.getElementById('client-payments-tbody');

        if (clientPayments.length === 0) {
            tbody.innerHTML = '<tr><td colspan="7" class="text-center">No client payments found</td></tr>';
            return;
        }

        tbody.innerHTML = clientPayments.map(cp => {
            const project = projects.find(p => p.project_id === cp.project_id);
            return `
            <tr>
                <td><strong>${project ? project.name : 'Unknown'}</strong></td>
                <td><strong style="color: var(--success);">${formatCurrency(cp.amount)}</strong></td>
                <td><span class="badge">${cp.payment_mode}</span></td>
                <td>${cp.reference_number || '-'}</td>
                <td>${formatDate(cp.payment_date)}</td>
                <td>${cp.remarks || '-'}</td>
                <td>
                    <button class="btn btn-sm btn-danger" onclick="deleteClientPayment(${cp.client_payment_id})">Delete</button>
                </td>
            </tr>
        `;
        }).join('');
    }

    document.getElementById('client-payment-form').addEventListener('submit', async (e) => {
        e.preventDefault();

        const data = {
            project_id: parseInt(document.getElementById('client-payment-project').value),
            amount: parseFloat(document.getElementById('client-payment-amount').value),
            payment_mode: document.getElementById('client-payment-mode').value,
            payment_date: document.getElementById('client-payment-date').value,
            reference_number: document.getElementById('client-payment-ref').value || null,
            remarks: document.getElementById('client-payment-remarks').value || null
        };

        try {
            const response = await fetch('/api/client-payments', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            if (response.ok) {
                showNotification('Client payment recorded successfully', 'success');
                closeModal('add-client-payment-modal');
                resetForm('client-payment-form');
                loadData();
            } else {
                showNotification('Error recording payment', 'error');
            }
        } catch (error) {
            console.error('Error:', error);
            showNotification('Error recording payment', 'error');
        }
    });

    async function deleteClientPayment(id) {
        if (!confirm('Are you sure you want to delete this client payment?')) return;

        try {
            const response = await fetch(`/api/client-payments/${id}`, { method: 'DELETE' });

            if (response.ok) {
                showNotification('Client payment deleted', 'success');
                loadData();
            } else {
                showNotification('Error deleting payment', 'error');
            }
        } catch (error) {
            console.error('Error:', error);
            showNotification('Error deleting payment', 'error');
        }
    }

    document.getElementById('client-payment-date').value = new Date().toISOString().split('T')[0];

    loadData();
</script>
{% endblock %}
